<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MetaAgent — React Flow canvas prototype</title>

<!-- React Flow v11 styles -->
<link rel="stylesheet" href="https://unpkg.com/reactflow@11.11.4/dist/style.css" />

<!-- Libraries (UMD) — needs internet on first open -->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/reactflow@11.11.4/dist/umd/index.js"></script>
<script crossorigin src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

<style>
  :root { --bg:#1e1f24; --panel:#26282f; --ink:#e8eaed; --muted:#9aa0a6; --accent:#1565C0; }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--ink); }
  .app { display: flex; flex-direction: column; height: 100%; }
  .toolbar {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    background: var(--panel); border-bottom: 1px solid #000; flex: 0 0 auto;
  }
  .toolbar h1 { font-size: 15px; font-weight: 600; margin: 0 8px 0 0; letter-spacing: .2px; }
  .toolbar .spacer { flex: 1; }
  .btn {
    background: var(--accent); color: #fff; border: 0; border-radius: 6px;
    padding: 7px 13px; font-size: 13px; cursor: pointer; font-weight: 600;
  }
  .btn.secondary { background: #3a3d46; }
  .btn:disabled { opacity: .5; cursor: default; }
  label.file { font-size: 13px; color: var(--muted); cursor: pointer; }
  label.file input { display: none; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; padding: 8px 14px;
            background: var(--panel); border-bottom: 1px solid #000; font-size: 12px; flex: 0 0 auto; }
  .legend .item { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .legend .sw { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #00000055; }
  .flow { flex: 1 1 auto; min-height: 0; }

  /* custom node */
  .mnode {
    width: 168px; border-radius: 10px; border: 1px solid #00000033;
    box-shadow: 0 2px 6px #00000055; padding: 8px 10px; color: #1a1a1a;
    font-size: 12px; position: relative; transition: box-shadow .15s, transform .15s;
  }
  .mnode .kind { font-size: 10px; text-transform: uppercase; letter-spacing: .6px;
                 opacity: .65; font-weight: 700; }
  .mnode .name { font-size: 13px; font-weight: 700; margin: 1px 0 2px; }
  .mnode .sub { font-size: 11px; opacity: .8; white-space: nowrap; overflow: hidden;
                text-overflow: ellipsis; }
  .mnode.running { box-shadow: 0 0 0 3px #FFA00088, 0 2px 10px #000; }
  .mnode.done    { box-shadow: 0 0 0 3px #2E7D3288, 0 2px 8px #000; }
  .mnode.error   { box-shadow: 0 0 0 3px #C6282888, 0 2px 8px #000; }
  .mnode .badge { position:absolute; top:-9px; right:-9px; width:18px; height:18px;
                  border-radius:50%; color:#fff; font-size:11px; line-height:18px;
                  text-align:center; font-weight:700; }
  .react-flow__handle { width: 7px; height: 7px; background: #607D8B; border: 1px solid #fff; }
  .hint { padding: 6px 14px; font-size: 12px; color: var(--muted); background: var(--panel);
          border-top: 1px solid #000; flex: 0 0 auto; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useCallback, useRef } = React;
const RF = window.ReactFlow;
const ReactFlowComp = RF.ReactFlow || RF.default;
const { Background, Controls, MiniMap, Handle, Position, MarkerType, ReactFlowProvider } = RF;

// ── MetaAgent palette (mirrors canvas_frame.KIND_COLORS / KIND_LABELS) ────────
const KIND_COLORS = {
  agent:"#BBDEFB", llm:"#C8E6C9", tool:"#FFE0B2", skill:"#E1BEE7", prompt:"#FFF9C4",
  rag:"#B2DFDB", webserver:"#FFCDD2", mcp:"#D1C4E9", workerpool:"#C5CAE9",
  router:"#B0BEC5", hitl:"#FFE082", eval:"#DCEDC8",
};
const KIND_LABELS = {
  agent:"Agent", llm:"LLM", tool:"Tools", skill:"Skills", prompt:"Prompt", rag:"RAG",
  webserver:"WebServer", mcp:"MCP", workerpool:"Worker Pool", router:"Router",
  hitl:"HITL", eval:"Eval",
};
const STATUS_COLOR = { running:"#FFA000", done:"#2E7D32", error:"#C62828" };
const FLOW_KINDS = new Set(["agent","workerpool","router","hitl"]);
const RESOURCE_KINDS = new Set(["llm","tool","skill","prompt","rag","mcp"]);
const NODE_W = 168, NODE_H = 64;

function subtitle(n) {
  const p = n.props || {};
  switch (n.kind) {
    case "llm": return p.model || p.provider || "";
    case "agent": case "workerpool": case "router": return "role: " + (p.role || "single");
    case "tool": return (p.files || []).join(", ");
    case "prompt": return "role: " + (p.role || "single");
    case "rag": return p.docs_dir ? p.docs_dir : "BM25 search_docs";
    case "skill": return ((p.skills || []).map(s => s.name).join(", ")) || "skills";
    case "mcp": return p.transport || "";
    case "webserver": return (p.host || "127.0.0.1") + ":" + (p.port || 8765);
    case "eval": return ((p.cases || []).length) + " cases";
    default: return "";
  }
}

// ── custom node: 4 sides × {source,target} handles, status ring + step badge ──
function MetaNode({ data }) {
  const sides = [
    [Position.Top, "top"], [Position.Right, "right"],
    [Position.Bottom, "bottom"], [Position.Left, "left"],
  ];
  return (
    <div className={"mnode " + (data.status || "")}
         style={{ background: KIND_COLORS[data.kind] || "#eee" }}>
      {sides.map(([pos, id]) => (
        <React.Fragment key={id}>
          <Handle type="target" position={pos} id={"t_" + id} />
          <Handle type="source" position={pos} id={"s_" + id} />
        </React.Fragment>
      ))}
      <div className="kind">{KIND_LABELS[data.kind] || data.kind}</div>
      <div className="name">{data.name}</div>
      <div className="sub">{data.sub}</div>
      {data.status === "running" && <div className="badge" style={{background:STATUS_COLOR.running}}>▶</div>}
      {data.status === "done"    && <div className="badge" style={{background:STATUS_COLOR.done}}>✓</div>}
      {data.status === "error"   && <div className="badge" style={{background:STATUS_COLOR.error}}>!</div>}
    </div>
  );
}
const nodeTypes = { meta: MetaNode };

// pick which sides an edge attaches to, based on relative node centers
function sidesFor(a, b) {
  const ax = a.x + NODE_W/2, ay = a.y + NODE_H/2;
  const bx = b.x + NODE_W/2, by = b.y + NODE_H/2;
  const dx = bx - ax, dy = by - ay;
  if (Math.abs(dx) >= Math.abs(dy))
    return dx >= 0 ? ["s_right","t_left"] : ["s_left","t_right"];
  return dy >= 0 ? ["s_bottom","t_top"] : ["s_top","t_bottom"];
}

// convert a MetaAgent graph (nodes:{id,kind,name,x,y,props}, edges:{src,dst}) → RF
function toReactFlow(graph) {
  const byId = {};
  (graph.nodes || []).forEach(n => { byId[n.id] = n; });
  const nodes = (graph.nodes || []).map(n => ({
    id: n.id, type: "meta", position: { x: n.x, y: n.y },
    data: { kind: n.kind, name: n.name, sub: subtitle(n), status: "" },
  }));
  const edges = (graph.edges || []).map((e, i) => {
    const s = byId[e.src], d = byId[e.dst];
    if (!s || !d) return null;
    const isFlow = FLOW_KINDS.has(s.kind) && FLOW_KINDS.has(d.kind);
    const [sh, th] = sidesFor(s, d);
    return {
      id: "e" + i, source: e.src, target: e.dst, sourceHandle: sh, targetHandle: th,
      type: "smoothstep", animated: isFlow,
      style: { stroke: isFlow ? "#1565C0" : "#90A4AE",
               strokeWidth: isFlow ? 2.2 : 1.3,
               strokeDasharray: isFlow ? undefined : "5 4" },
      markerEnd: isFlow ? { type: MarkerType.ArrowClosed, color: "#1565C0" } : undefined,
    };
  }).filter(Boolean);
  return { nodes, edges };
}

// ── embedded sample (PEC.json — planner→executor→critic + router; keys redacted)
const SAMPLE = {"nodes":[
 {"id":"agent_1","kind":"agent","name":"planner","x":293,"y":130,"props":{"role":"planner"}},
 {"id":"llm_2","kind":"llm","name":"llm_planner","x":294,"y":70,"props":{"provider":"siliconflow","model":"DeepSeek-V4-Flash"}},
 {"id":"agent_3","kind":"agent","name":"executor","x":744,"y":575,"props":{"role":"worker"}},
 {"id":"llm_4","kind":"llm","name":"llm_executor","x":742,"y":514,"props":{"model":"DeepSeek-V4-Flash"}},
 {"id":"agent_5","kind":"agent","name":"critic","x":1110,"y":377,"props":{"role":"critic"}},
 {"id":"llm_6","kind":"llm","name":"llm_critic","x":1113,"y":497,"props":{"model":"DeepSeek-V4-Flash"}},
 {"id":"tool_7","kind":"tool","name":"tools","x":750,"y":695,"props":{"files":["base64_decode.py"]}},
 {"id":"agent_8","kind":"agent","name":"agent","x":730,"y":271,"props":{"role":"worker"}},
 {"id":"llm_9","kind":"llm","name":"llm_agent","x":732,"y":211,"props":{"model":"DeepSeek-V4-Flash"}},
 {"id":"tool_11","kind":"tool","name":"tool_4","x":732,"y":327,"props":{"files":["base64_encode.py","load_csv.py"]}},
 {"id":"prompt_12","kind":"prompt","name":"prompt_12","x":297,"y":185,"props":{"role":"planner","text":"You are job orchestrator, the planner."}},
 {"id":"prompt_13","kind":"prompt","name":"prompt_13","x":747,"y":634,"props":{"role":"worker","text":"You are base64decoder, the worker."}},
 {"id":"prompt_14","kind":"prompt","name":"prompt_14","x":731,"y":382,"props":{"role":"worker","text":"You are base64_encoder and csv loader."}},
 {"id":"prompt_15","kind":"prompt","name":"prompt_15","x":1111,"y":439,"props":{"role":"critic","text":"You are the critic."}},
 {"id":"router_16","kind":"router","name":"router_16","x":367,"y":469,"props":{"role":"router"}},
 {"id":"llm_17","kind":"llm","name":"llm_17","x":367,"y":408,"props":{"model":"DeepSeek-V4-Flash"}},
 {"id":"prompt_18","kind":"prompt","name":"prompt_18","x":367,"y":528,"props":{"role":"single","text":"You are the router."}}
],"edges":[
 {"src":"llm_2","dst":"agent_1"},{"src":"llm_4","dst":"agent_3"},{"src":"llm_6","dst":"agent_5"},
 {"src":"tool_7","dst":"agent_3"},{"src":"agent_3","dst":"agent_5"},{"src":"agent_5","dst":"agent_1"},
 {"src":"llm_9","dst":"agent_8"},{"src":"tool_11","dst":"agent_8"},{"src":"agent_8","dst":"agent_5"},
 {"src":"prompt_12","dst":"agent_1"},{"src":"prompt_13","dst":"agent_3"},{"src":"prompt_14","dst":"agent_8"},
 {"src":"prompt_15","dst":"agent_5"},{"src":"llm_17","dst":"router_16"},{"src":"prompt_18","dst":"router_16"},
 {"src":"agent_1","dst":"router_16"},{"src":"router_16","dst":"agent_3"},{"src":"router_16","dst":"agent_8"}
]};

function App() {
  const [graph, setGraph] = useState(SAMPLE);
  const [statuses, setStatuses] = useState({});
  const [running, setRunning] = useState(false);
  const timerRef = useRef(null);

  const base = useMemo(() => toReactFlow(graph), [graph]);

  // overlay statuses onto the converted nodes/edges
  const nodes = useMemo(() => base.nodes.map(n => ({
    ...n, data: { ...n.data, status: statuses[n.id] || "" },
  })), [base, statuses]);

  const loadFile = useCallback(async (file) => {
    stopSim();
    setStatuses({});
    try {
      if (file.name.toLowerCase().endsWith(".mta")) {
        const zip = await JSZip.loadAsync(file);
        const entry = zip.file("graph.json");
        if (!entry) throw new Error("graph.json not found in .mta bundle");
        setGraph(JSON.parse(await entry.async("string")));
      } else {
        setGraph(JSON.parse(await file.text()));
      }
    } catch (err) { alert("Could not load graph:\n" + err.message); }
  }, []);

  function stopSim() {
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    setRunning(false);
  }

  // mirror runtime_overlay: walk the agent stages left→right idle→running→done
  function simulate() {
    stopSim();
    const order = (graph.nodes || [])
      .filter(n => n.kind === "agent" || n.kind === "workerpool" || n.kind === "router")
      .sort((a, b) => a.x - b.x);
    if (!order.length) return;
    setStatuses({});
    setRunning(true);
    let i = 0;
    timerRef.current = setInterval(() => {
      setStatuses(prev => {
        const next = { ...prev };
        if (i > 0) next[order[i - 1].id] = "done";
        if (i < order.length) next[order[i].id] = "running";
        return next;
      });
      i += 1;
      if (i > order.length) stopSim();
    }, 700);
  }

  return (
    <div className="app">
      <div className="toolbar">
        <h1>MetaAgent · React Flow canvas prototype</h1>
        <button className="btn" onClick={simulate} disabled={running}>▶ Simulate run</button>
        <button className="btn secondary" onClick={() => { stopSim(); setStatuses({}); }}>Reset</button>
        <span className="spacer"></span>
        <label className="file">
          Load .json / .mta…
          <input type="file" accept=".json,.mta"
                 onChange={e => e.target.files[0] && loadFile(e.target.files[0])} />
        </label>
        <button className="btn secondary" onClick={() => { stopSim(); setStatuses({}); setGraph(SAMPLE); }}>
          Load sample
        </button>
      </div>

      <div className="legend">
        {Object.keys(KIND_LABELS).map(k => (
          <span className="item" key={k}>
            <span className="sw" style={{ background: KIND_COLORS[k] }}></span>{KIND_LABELS[k]}
          </span>
        ))}
        <span className="item" style={{ marginLeft: 12 }}>
          <span style={{ width:22, height:0, borderTop:"2px solid #1565C0" }}></span> flow (agent→agent)
        </span>
        <span className="item">
          <span style={{ width:22, height:0, borderTop:"2px dashed #90A4AE" }}></span> resource→agent
        </span>
      </div>

      <div className="flow">
        <ReactFlowProvider>
          <ReactFlowComp
            nodes={nodes} edges={base.edges} nodeTypes={nodeTypes}
            fitView minZoom={0.1} proOptions={{ hideAttribution: true }}>
            <Background gap={18} size={1} color="#3a3d46" />
            <MiniMap pannable zoomable nodeColor={n => KIND_COLORS[n.data.kind] || "#888"}
                     style={{ background:"#26282f" }} />
            <Controls />
          </ReactFlowComp>
        </ReactFlowProvider>
      </div>

      <div className="hint">
        {(graph.nodes || []).length} nodes · {(graph.edges || []).length} edges —
        drag nodes, scroll to zoom, drag canvas to pan, use the minimap. Solid blue
        arrows = control flow; dashed grey = resources feeding an agent. "Simulate run"
        animates the same idle→running→done states your wx runtime overlay paints.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
