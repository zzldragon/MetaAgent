[pytest]
testpaths = tests

# Per-test wall-clock cap (pytest-timeout). A hung test is FAILED by name with a
# stack dump instead of blocking the whole run. 300s > the slowest legit test:
# the _verify_* scripts self-cap their own subprocess at 240s (tests/test_verify_suite.py),
# unit/canvas tests are <30s. Raise this only if a genuine test needs longer.
#
# These are INI options (not addopts --timeout=...), so if pytest-timeout isn't
# installed pytest just ignores them (a warning) and still runs — it does NOT hard
# fail on an unknown CLI flag. Install the cap with:  pip install -r requirements-dev.txt
#
# thread method is REQUIRED on Windows (the signal/SIGALRM method is Unix-only).
timeout = 300
timeout_method = thread
